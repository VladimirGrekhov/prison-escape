# HTTP -> redirect everything to HTTPS
server {
    if ($host = prison-escape.duckdns.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80 default_server;
    listen [::]:80 default_server;
    server_name prison-escape.duckdns.org;
    return 301 https://$host$request_uri;


}

# HTTPS
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    server_name prison-escape.duckdns.org;
    ssl_certificate /etc/letsencrypt/live/prison-escape.duckdns.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/prison-escape.duckdns.org/privkey.pem; # managed by Certbot
    ssl_dhparam         /etc/nginx/ssl/dhparam.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # security headers (applied with 'always' so they are sent on errors too)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/font-woff
        font/woff2;

    # brotli compression
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 256;
    brotli_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/font-woff
        font/woff2;

    root /var/www/prison-escape;
    index index.html;

    # Prison Escape multiplayer (Colyseus) — WebSocket + matchmaking HTTP,
    # proxied to the local node server. Prefix /mp/ is stripped before forwarding.
    location /mp/ {
        proxy_pass http://127.0.0.1:2567/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Debug log sink (client ?debug=1 posts log lines here -> node :2568 -> file).
    location /log {
        proxy_pass http://127.0.0.1:2568;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 128k;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # static asset caching
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        # add_header here overrides inherited headers, so re-declare them
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;
        add_header Cache-Control "public";
    }

    access_log /var/log/nginx/prison-escape.access.log;
    error_log  /var/log/nginx/prison-escape.error.log;

}
